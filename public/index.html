<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <title>Kaveri Tailors</title>

    <!-- Meta Description for SEO -->
    <meta
      name="description"
      content="Kaveri Tailors is your trusted online store for tailored clothing, offering a range of traditional and modern apparel for men and women."
    />

    <!-- Meta Keywords for SEO -->
    <meta
      name="keywords"
      content="tailored clothing, clothing, online , men's apparel, women's apparel, e-commerce, Kaveri Tailors"
    />

    <!-- Author -->
    <meta name="author" content="Kaveri Tailors" />

    <!-- Open Graph (OG) Tags for Social Media -->
    <meta
      property="og:title"
      content="Kaveri Tailors - Your Go-To E-commerce Platform for Tailored Clothing"
    />
    <meta
      property="og:description"
      content="Kaveri Tailors is your trusted online store for tailored clothing, offering a range of traditional and modern apparel for men and women."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo.png" />
    <meta property="og:url" content="https://www.kaveritailors.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Kaveri Tailors - Your Go-To E-commerce Platform for Tailored Clothing"
    />
    <meta
      name="twitter:description"
      content="Kaveri Tailors is your trusted online store for tailored clothing, offering a range of traditional and modern apparel for men and women."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo.png" />
    <meta name="twitter:site" content="@KaveriTailors" />

    <!-- Structured Data (JSON-LD) for E-commerce -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Kaveri Tailors",
        "url": "https://www.kaveritailors.com",
        "logo": "%PUBLIC_URL%/logo.png",
        "sameAs": [
          "https://www.facebook.com/KaveriTailors",
          "https://www.instagram.com/KaveriTailors",
          "https://twitter.com/KaveriTailors"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-800-555-5555",
          "contactType": "Customer Service"
        },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Tailor Street",
          "addressLocality": "CityName",
          "addressRegion": "StateName",
          "postalCode": "12345",
          "addressCountry": "CountryName"
        }
      }
    </script>

    <!-- Add manifest and other necessary links -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="stylesheet" href="%PUBLIC_URL%/index.css" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
